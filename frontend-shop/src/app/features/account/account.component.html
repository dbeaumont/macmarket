<div class="container mx-auto px-4 py-8 max-w-xl">
  <h1 class="text-3xl font-bold text-gray-900 mb-8">Mon compte</h1>

  @if (loading()) {
    <div class="flex justify-center py-16"><mat-spinner [diameter]="48" /></div>
  } @else if (userInfo()) {
    <div class="rounded-xl border border-gray-200 bg-white p-6 space-y-4">
      <div class="flex items-center gap-4">
        <div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center">
          <mat-icon class="text-3xl text-blue-600">person</mat-icon>
        </div>
        <div>
          <p class="text-xl font-semibold text-gray-900">{{ userInfo()!.name }}</p>
          <p class="text-sm text-gray-500">{{ userInfo()!.email }}</p>
        </div>
      </div>

      <div class="border-t border-gray-200 pt-4 space-y-2">
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">Identifiant</span>
          <span class="font-medium text-gray-900">{{ userInfo()!.preferredUsername }}</span>
        </div>
      </div>

      <div class="border-t border-gray-200 pt-4">
        <p class="text-sm text-gray-500 mb-2">Rôles</p>
        <div class="flex flex-wrap gap-2">
          @for (role of userInfo()!.roles; track role) {
            <span class="inline-block text-xs font-medium px-2 py-1 bg-blue-50 text-blue-700 rounded-full">
              {{ role }}
            </span>
          }
        </div>
      </div>

      <div class="border-t border-gray-200 pt-4">
        <button mat-stroked-button color="warn" (click)="logout()" class="w-full">
          <mat-icon>logout</mat-icon>
          Se déconnecter
        </button>
      </div>
    </div>
  }
</div>
