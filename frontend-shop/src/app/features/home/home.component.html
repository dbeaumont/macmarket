<!-- Hero -->
<section class="relative overflow-hidden bg-gradient-to-br from-slate-900 via-slate-800 to-blue-900 text-white">
  <div class="container mx-auto px-4 py-24 md:py-32 text-center">
    <h1 class="text-4xl md:text-6xl font-bold tracking-tight">
      Le meilleur du <span class="text-blue-400">Mac</span>,<br />au meilleur prix.
    </h1>
    <p class="mt-6 text-lg md:text-xl text-slate-300 max-w-2xl mx-auto">
      MacBook Air, MacBook Pro, iMac, Mac Mini, Mac Studio, Mac Pro — découvrez toute la
      gamme Apple et trouvez le Mac qui vous correspond.
    </p>
    <div class="mt-8">
      <a routerLink="/products"
         class="inline-flex items-center gap-2 rounded-lg bg-white text-slate-900 px-6 py-3 font-semibold hover:bg-slate-100 transition-colors">
        Voir le catalogue
        <mat-icon>arrow_forward</mat-icon>
      </a>
    </div>
  </div>
</section>

<!-- Nouveautés -->
<section class="container mx-auto px-4 py-16">
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-2xl font-bold text-gray-900">Nouveautés</h2>
    <a routerLink="/products"
       class="text-sm text-gray-500 hover:text-gray-900 transition-colors inline-flex items-center gap-1">
      Voir tout <mat-icon class="text-base">arrow_forward</mat-icon>
    </a>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-12">
      <mat-spinner [diameter]="40" />
    </div>
  } @else {
    <app-product-grid [products]="products()" />
  }
</section>
