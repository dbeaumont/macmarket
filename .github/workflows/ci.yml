name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: mvn -B compile --no-transfer-progress

      - name: Tests unitaires et intégration
        run: mvn -B verify --no-transfer-progress

      - name: Upload rapport de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/

  frontend-admin:
    name: Frontend Admin — Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Vérification TypeScript
        run: npx tsc --noEmit

      - name: Tests
        run: npm test -- --run

      - name: Build production
        run: npm run build -- --configuration production

  frontend-shop:
    name: Frontend Shop — Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-shop

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-shop/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Vérification TypeScript
        run: npx tsc --noEmit

      - name: Tests
        run: npm test -- --run

      - name: Build production
        run: npm run build -- --configuration production
