services:

  postgres:
    image: postgres:17-alpine
    container_name: macmarket-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init-keycloak-schema.sql:/docker-entrypoint-initdb.d/01-init-keycloak.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - macmarket-net

  keycloak:
    image: keycloak/keycloak:26.6.0
    container_name: macmarket-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: ${KEYCLOAK_HTTP_PORT}
      KC_HEALTH_ENABLED: "true"
    command: start-dev --import-realm
    ports:
      - "${KEYCLOAK_HTTP_PORT}:${KEYCLOAK_HTTP_PORT}"
    volumes:
      - ./keycloak/macmarket-realm.json:/opt/keycloak/data/import/macmarket-realm.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - macmarket-net

  ollama:
    image: ollama/ollama:latest
    container_name: macmarket-ollama
    platform: linux/arm64   # pour mac M1/M2, sinon linux/amd64 pour les autres architectures
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - macmarket-net

  ollama-init:
    image: ollama/ollama:latest
    container_name: macmarket-ollama-init
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL}"]
    environment:
      OLLAMA_HOST: ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - macmarket-net
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    container_name: macmarket-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_UI_PORT}:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/info || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - macmarket-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL}
    container_name: macmarket-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:${KEYCLOAK_HTTP_PORT}/realms/macmarket
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:${KEYCLOAK_HTTP_PORT}/realms/macmarket/protocol/openid-connect/certs
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OLLAMA_CHAT_MODEL: ${OLLAMA_MODEL}
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      ollama:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - macmarket-net

  frontend-shop:
    build:
      context: ./frontend-shop
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY_URL: ${NPM_REGISTRY_URL}
        NPM_REGISTRY_HOST: ${NPM_REGISTRY_HOST}
      secrets:
        - artifactory_token
    container_name: macmarket-frontend-shop
    ports:
      - "${FRONTEND_SHOP_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - macmarket-net

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY_URL: ${NPM_REGISTRY_URL}
        NPM_REGISTRY_HOST: ${NPM_REGISTRY_HOST}
      secrets:
        - artifactory_token
    container_name: macmarket-frontend-admin
    ports:
      - "${FRONTEND_ADMIN_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - macmarket-net

volumes:
  postgres_data:

networks:
  macmarket-net:
    driver: bridge

secrets:
  artifactory_token:
    environment: ARTIFACTORY_TOKEN
