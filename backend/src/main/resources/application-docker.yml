spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/macmarket

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8180/realms/macmarket

  ai:
    ollama:
      base-url: http://ollama:11434

  mail:
    host: mailpit
    port: 1025

# Profil "docker" = stack complete locale (docker-compose), pas un environnement de production.
# Swagger reste actif ici pour les tests locaux. Le profil "prod" (application-prod.yml)
# desactive springdoc et doit etre ajoute a SPRING_PROFILES_ACTIVE lors d'un deploiement reel.

